name: Post Deployment Checks

on:
  deployment_status:

permissions:
  contents: read

jobs:
  auth-callback:
    name: Auth callback smoke check
    if: ${{ github.event.deployment_status.state == 'success' && (github.event.deployment_status.environment_url != '' || github.event.deployment_status.target_url != '') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Run auth callback post-deployment checks
        env:
          DEPLOYMENT_URL: ${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node scripts/post-deploy-auth-check.js
