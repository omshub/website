name: Flag Inappropriate Review
description: Report a review that is spam, abusive, or violates community guidelines
title: "[Flag Review]: "
labels: ["moderation"]
body:
  - type: markdown
    attributes:
      value: |
        Please use this form to flag reviews that violate our community guidelines. Do not include personally identifying information about the reviewer.
  - type: input
    id: course
    attributes:
      label: Course the review is for
      placeholder: e.g. CS 6200
    validations:
      required: true
  - type: textarea
    id: review_content
    attributes:
      label: Review content or link
      description: Paste the review text or a direct URL to the review page so we can find it quickly.
      placeholder: Paste the review text here...
    validations:
      required: true
  - type: dropdown
    id: reason
    attributes:
      label: Reason for flagging
      options:
        - Spam or advertising
        - Abusive or offensive language
        - Not a genuine review
        - Personal attack on instructor
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Additional details
      description: Briefly describe why this review should be removed.
    validations:
      required: true
